
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TechStack AI</title>

    <!-- Google Font -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    fontFamily: {

                        sans: ['Inter', 'sans-serif']

                    },

                    colors: {

                        background: '#020617',

                        surface: '#0f172a',

                        card: '#111827',

                        primary: '#4f46e5',

                        accent: '#06b6d4'

                    },

                    animation: {

                        fadeIn: "fadeIn .8s ease",

                        slideUp: "slideUp .7s ease"

                    },

                    keyframes: {

                        fadeIn: {

                            "0%": {

                                opacity: 0

                            },

                            "100%": {

                                opacity: 1

                            }

                        },

                        slideUp: {

                            "0%": {

                                opacity: 0,

                                transform: "translateY(30px)"

                            },

                            "100%": {

                                opacity: 1,

                                transform: "translateY(0)"

                            }

                        }

                    }

                }

            }

        }

    </script>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">

</head>

<body class="bg-background text-white font-sans min-h-screen">

    <!-- ===================== -->
    <!-- Navigation -->
    <!-- ===================== -->

    <nav class="fixed top-0 left-0 w-full backdrop-blur-md bg-slate-950/70 border-b border-slate-800 z-50">

        <div class="max-w-7xl mx-auto flex justify-between items-center px-8 py-5">

            <div>

                <h1 class="text-2xl font-bold">

                    TechStack

                    <span class="text-cyan-400">

                        AI

                    </span>

                </h1>

            </div>

            <div class="space-x-8 hidden md:flex">

                <a href="#"
                   class="hover:text-cyan-400 transition">

                    Home

                </a>

                <a href="#"
                   class="hover:text-cyan-400 transition">

                    About

                </a>

                <a href="#"
                   class="hover:text-cyan-400 transition">

                    GitHub

                </a>

            </div>

        </div>

    </nav>

    <!-- ===================== -->
    <!-- Main Content -->
    <!-- ===================== -->

    <main class="pt-28">

        {% block content %}
        {% endblock %}

    </main>

    <!-- ===================== -->
    <!-- Footer -->
    <!-- ===================== -->

    <footer class="mt-24 border-t border-slate-800">

        <div class="max-w-7xl mx-auto px-8 py-8 text-center text-slate-500">

            © 2026 TechStack AI

            <br>

            AI-Powered Career Recommendation Platform

        </div>

    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>

</html>
